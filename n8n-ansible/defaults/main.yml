---
# User for deploy
custom_vars:
  user: deploy
  group: devops
  timezone: Etc/UTC
  work_dir: "/opt/infra"

hostname_name: fpe-n8n

# Network  Interface Vars
network:
  interface: "ens160"
  address: "192.168.10.7/24"
  gateway: "192.168.107.254"
  dns: "8.8.8.8"

server_ip: 192.168.10.7

playbook_dir: /root/n8n-ansible

# n8n settings
n8n_port: 5678
n8n_version: latest
n8n_data_path: /root/n8n/data
n8n_timezone: UTC


# n8n domain for SSL
n8n_domain: "n8n.fpe.com"
use_ssl: false


# n8n Auth
n8n_basic_auth_active: true
n8n_basic_auth_user: "admin"
n8n_basic_auth_password: "Energy@1361@FPE"
  

# Repository Addresses
repos:
  apt_package: "http://mirror.arvancloud.ir/ubuntu"
  docker_package: "https://mirror.arvancloud.ir/linux/ubuntu"
  docker_gpg: "https://mirror.arvancloud.ir/rawhub/"
  registry: https://pcr.amertka.com

# Required Packages
packages:
  - vim
  - util-linux
  - sudo
  - gnupg
  - curl
  - dnsutils
  - unzip
  - ca-certificates
  
# Register Static Records In /etc/hosts
hosts:
  file-ubuntu-server: "192.168.10.7"

service_vars:
  filebeat:
    version: 9.3.1
  cadvisor:
    version:
  fluentd:
    version:
  node_exporter:
    version:
  network_docker: infra_net
