---
# User for deploy
custom_vars:
  user: deploy
  group: devops
  timezone: Etc/UTC
  work_dir: "/opt/infra"

# Network  Interface Vars
network:
  interface: "ens3"
  address: "192.168.10.19/24"
  gateway: "192.168.10.254"
  dns: "8.8.8.8"


# DNS Server Settings

dns_primary_ip: "192.168.10.19"
dns_secondary_ip: "192.168.10.18"

dns_zone_name: "example.local"
dns_zone_file: "db.example.local"
dns_reverse_zone_name: "10.168.192.in-addr.arpa"
dns_reverse_zone_file: "db.10.168.192"

dns_listen_ip: "0.0.0.0"
dns_network_cidr: "192.168.10.0/24"

dns_forwarders:
  - "8.8.8.8"
  - "8.8.4.4"

dns_records: []
dns_ptr_records: []

dns_docker_project_dir: "/opt/dns-server"
dns_container_name: "bind9-dns"
dns_image: "ubuntu/bind9:latest"
dns_timezone: "UTC"

dns_zone_serial: "{{ lookup('pipe', 'date +%Y%m%d%H') }}"
dns_reverse_zone_serial: "{{ lookup('pipe', 'date +%Y%m%d%H') }}"

dns_container_cpu_limit: "1"
dns_container_memory_limit: "512m"

# Repository Addresses
repos:
  apt_package: "http://pbr.amertka.com/ubuntu"
  docker_package: "https://pbr.amertka.com/linux/ubuntu"
  docker_gpg: "https://pbr.amertka.com/rawhub/"
  registry: https://pcr.amertka.com

# Required Packages
packages:
  - vim
  - util-linux
  - sudo
  - gnupg
  - curl
  - dnsutils
  - unzip
  - ca-certificates
  
# Register Static Records In /etc/hosts
hosts:
  NTP-DNS-server-2: "192.168.10.19"

service_vars:
  filebeat:
    version: 9.3.1
  cadvisor:
    version:
  fluentd:
    version:
  node_exporter:
    version:
  network_docker: infra_net
