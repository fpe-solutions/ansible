---
- name: Install prerequisites
  apt:
    name:
      - curl
      - wget
      - tar
      - prometheus-node-exporter
    state: present
    update_cache: true
  register: prometheus_prereqs

- name: Ensure prometheus-node-exporter is enabled and started
  systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
    daemon_reload: true
  register: node_exporter_service

- name: Create prometheus user
  user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /etc/prometheus/rules
    - /etc/prometheus/file_sd
    - /etc/prometheus/consoles
    - /etc/prometheus/console_libraries
    - /var/lib/prometheus

- name: Download prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    mode: "0644"

- name: Extract prometheus
  unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/
    remote_src: true

- name: Install prometheus binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  register: prometheus_binaries

- name: Copy console files
  shell: |
    cp -r /tmp/prometheus-{{ prometheus_version }}.linux-amd64/consoles/* /etc/prometheus/consoles/
    cp -r /tmp/prometheus-{{ prometheus_version }}.linux-amd64/console_libraries/* /etc/prometheus/console_libraries/
  register: prometheus_console_copy
  changed_when: prometheus_console_copy.rc == 0

- name: Set prometheus ownership
  file:
    path: "{{ item }}"
    owner: prometheus
    group: prometheus
    recurse: true
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Configure prometheus
  copy:
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      rule_files: []

      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets:
                - 127.0.0.1:{{ prometheus_port }}

        - job_name: loki
          static_configs:
            - targets:
                - 127.0.0.1:{{ loki_port }}

        - job_name: promtail
          static_configs:
            - targets:
                - 127.0.0.1:{{ promtail_http_port }}

        - job_name: grafana
          static_configs:
            - targets:
                - 127.0.0.1:{{ grafana_port }}

        - job_name: node_exporter
          static_configs:
            - targets:
                - 127.0.0.1:9100
  register: prometheus_config

- name: Create prometheus service
  copy:
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --storage.tsdb.retention.time={{ prometheus_retention }} \
        --web.listen-address=:{{ prometheus_port }}
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  register: prometheus_service

- name: Ensure prometheus is enabled
  systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true

- name: Restart prometheus if needed
  systemd:
    name: prometheus
    state: restarted
    enabled: true
    daemon_reload: true
  when: prometheus_binaries.changed or prometheus_config.changed or prometheus_service.changed

- name: Wait for node_exporter
  wait_for:
    host: 127.0.0.1
    port: 9100
    timeout: 60

- name: Wait for prometheus
  wait_for:
    host: 127.0.0.1
    port: "{{ prometheus_port }}"
    timeout: 60
