---
# User for deploy
custom_vars:
  user: deploy
  group: devops
  timezone: Etc/UTC
  work_dir: "/opt/infra"

# Network  Interface Vars
network:
  interface: "ens3"
  address: "192.168.10.11/24"
  gateway: "192.168.10.254"
  dns: "8.8.8.8"


# Monitoring settings

# Grafana
remote_log_root: "/var/log/remote"
rsyslog_udp_port: 514
rsyslog_tcp_port: 514
loki_push_url: "http://127.0.0.1:3100/loki/api/v1/push"

# Prometheus
loki_version: "3.1.0"
promtail_version: "3.1.0"
prometheus_version: "2.53.0"
grafana_port: 3000
loki_port: 3100
promtail_http_port: 9080
prometheus_port: 9090
prometheus_retention: "15d"

# Repository Addresses
repos:
  apt_package: "http://pbr.amertka.com/ubuntu"
  docker_package: "https://pbr.amertka.com/linux/ubuntu"
  docker_gpg: "https://pbr.amertka.com/rawhub/"
  registry: https://pcr.amertka.com

# Required Packages
packages:
  - vim
  - util-linux
  - sudo
  - gnupg
  - curl
  - dnsutils
  - unzip
  - ca-certificates
  
# Register Static Records In /etc/hosts
hosts:
  monitoring-server: "192.168.10.7"

service_vars:
  filebeat:
    version: 9.3.1
  cadvisor:
    version:
  fluentd:
    version:
  node_exporter:
    version:
  network_docker: infra_net
