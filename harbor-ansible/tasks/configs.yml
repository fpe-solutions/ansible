---
- name: System bootstrap configuration
  become: true
  block:

    # -----------------------------
    # APT sources
    # -----------------------------
    - name: Configure APT sources.list
      ansible.builtin.template:
        src: sources-list.j2
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
      register: apt_sources

    # -----------------------------
    # Hostname configuration
    # -----------------------------
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    # -----------------------------
    # /etc/hosts management (clean & idempotent)
    # -----------------------------
    - name: Manage /etc/hosts block
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED HOSTS"
        block: |
          127.0.0.1 {{ inventory_hostname }}
          {% for name, ip in hosts.items() %}
          {{ ip }} {{ name }}
          {% endfor %}

    # -----------------------------
    # Set Time Zone
    # -----------------------------
    - name: Set system timezone
      command: timedatectl set-timezone {{ custom_vars.timezone }}
      become: true

    # -----------------------------
    # Update APT cache only when needed
    # -----------------------------
    #- name: Update APT cache
    #  ansible.builtin.apt:
    #    update_cache: yes
    #  failed_when: false
